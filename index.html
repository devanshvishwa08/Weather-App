<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"> <!-- Sets character encoding so text displays correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes site mobile-friendly -->
    <title>Weather App</title> <!-- Title shown in browser tab -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
        }

        #weather {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>Weather App</h1>
    <div class="container">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Get Weather</button>
        <div id="weather"></div>
        <div id="forecast"></div>
    </div>
    <script src="script.js"></script>
</body>


</html>
